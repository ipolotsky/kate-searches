name: Deploy

# Деплой запускается ТОЛЬКО после успешного CI (workflow_run) или вручную.
# Реальные шаги добавим, когда будет VPS (сейчас — плейсхолдер, чтобы не падать).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy (production)
    runs-on: ubuntu-latest
    # гейт: деплоим только если CI прошёл зелёным
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      # TODO(vps): когда появится сервер — добавить секреты VPS_HOST / VPS_USER / VPS_SSH_KEY
      # и шаги сборки + деплоя. Пример паттерна (ssh + docker compose):
      #
      # - name: build images
      #   run: docker compose -f docker-compose.prod.yml build
      # - name: deploy over ssh
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.VPS_HOST }}
      #     username: ${{ secrets.VPS_USER }}
      #     key: ${{ secrets.VPS_SSH_KEY }}
      #     script: cd /srv/kate-searches && git pull && docker compose -f docker-compose.prod.yml up -d --build
      - name: placeholder
        run: echo "CI passed. Deploy steps to be wired when VPS is ready."
