name: Deploy Production

# Merge в main -> прогон CI -> сборка образов -> миграции -> rollout на прод.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_WEB: ghcr.io/ipolotsky/kate-searches/web
  IMAGE_API: ghcr.io/ipolotsky/kate-searches/api
  TAG: prod-${{ github.sha }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push web (prod NEXT_PUBLIC_* baked in)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ env.TAG }}
            ${{ env.IMAGE_WEB }}:prod
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - name: build & push api
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ env.TAG }}
            ${{ env.IMAGE_API }}:prod
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  migrate:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: apply Supabase migrations (idempotent)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: make db-migrate

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: sync compose + deploy script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/compose.yml,deploy/deploy.sh"
          target: "/srv/kate-searches"
          strip_components: 1
      - name: rollout on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            chmod +x /srv/kate-searches/deploy.sh
            /srv/kate-searches/deploy.sh prod ${{ env.TAG }} ${{ env.TAG }}
