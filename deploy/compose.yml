# Один шаблон стека на оба окружения. Значения ${...} берутся из .env рядом с этим файлом
# (COMPOSE_PROJECT_NAME=${STACK}: kate-prod / kate-stage). Разворачивается через deploy.sh.
#
# web/api не имеют container_name и host ports — это обязательное условие docker rollout
# (rollout поднимает вторую реплику, фиксированное имя/порт этому мешают). Наружу торчит
# только web через Traefik; api/worker/beat/redis живут в приватной сети internal.
#
# Лимиты памяти и concurrency воркера параметризованы через .env: у stage значения ниже,
# чем у prod (см. deploy/env.example и per-env .env на VM).
name: ${STACK}

networks:
  proxy:
    external: true
  internal:
    driver: bridge

services:
  web:
    image: ghcr.io/ipolotsky/kate-searches/web:${WEB_TAG}
    restart: unless-stopped
    env_file: [.env]
    environment:
      API_BASE_URL: http://api:8000
      PORT: "3000"
    networks: [proxy, internal]
    mem_limit: ${WEB_MEM:-640m}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.${STACK}-web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.${STACK}-web.entrypoints=websecure
      - traefik.http.routers.${STACK}-web.tls.certresolver=le
      - traefik.http.services.${STACK}-web.loadbalancer.server.port=3000

  api:
    image: ghcr.io/ipolotsky/kate-searches/api:${API_TAG}
    restart: unless-stopped
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
    networks: [internal]
    mem_limit: ${API_MEM:-512m}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready',timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  worker:
    image: ghcr.io/ipolotsky/kate-searches/api:${API_TAG}
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "worker", "-Q", "default,fetch,extract,score,generate,emails", "-l", "info", "--concurrency", "${WORKER_CONCURRENCY:-2}"]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
    networks: [internal]
    mem_limit: ${WORKER_MEM:-768m}
    depends_on:
      redis:
        condition: service_healthy
    # worker не поднимает HTTP-сервер: вшитый в образ HTTP-healthcheck ему не подходит,
    # проверяем живость воркера через celery ping (ответ по брокеру).
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -t 8 >/dev/null 2>&1"]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 45s
    stop_grace_period: 60s

  beat:
    image: ghcr.io/ipolotsky/kate-searches/api:${API_TAG}
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "beat", "-l", "info", "--schedule", "/tmp/celerybeat-schedule"]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
    networks: [internal]
    mem_limit: ${BEAT_MEM:-160m}
    depends_on:
      redis:
        condition: service_healthy
    # beat — планировщик без HTTP и без осмысленной пробы; вшитый HTTP-healthcheck отключаем,
    # живость покрывает restart: unless-stopped (краш процесса -> контейнер перезапустится).
    healthcheck:
      disable: true
    stop_grace_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [internal]
    mem_limit: ${REDIS_MEM:-192m}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
